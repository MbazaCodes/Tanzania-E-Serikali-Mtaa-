    <!-- Crypto polyfill for older browsers and extensions -->
    <script>
      // Polyfill for crypto.randomUUID()
      (function() {
        if (!window.crypto) {
          window.crypto = {};
        }
        
        if (!window.crypto.randomUUID) {
          window.crypto.randomUUID = function() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
              const r = Math.random() * 16 | 0;
              const v = c === 'x' ? r : (r & 0x3 | 0x8);
              return v.toString(16);
            });
          };
        }
        
        // Polyfill for WebCrypto API if needed for Supabase
        if (!window.crypto.subtle && window.crypto.webkitSubtle) {
          window.crypto.subtle = window.crypto.webkitSubtle;
        }
        
        // Check if we're in development mode without using process.env
        // This works in browser environment
        const isDevelopment = window.location.hostname === 'localhost' || 
                             window.location.hostname === '127.0.0.1' ||
                             window.location.port === '5173' ||
                             window.location.port === '3000';
        
        if (isDevelopment) {
          console.log('âœ… Crypto polyfills loaded. randomUUID supported:', typeof window.crypto.randomUUID === 'function');
        }
      })();
    </script>
    
    <script>
      // Dynamic theme color for browsers that support it
      (function() {
        // Check if browser supports theme-color meta tag
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta && window.matchMedia('(display-mode: browser)').matches) {
          // Only apply on supported browsers
          const isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
          if (!isFirefox) {
            themeColorMeta.setAttribute('content', '#059669');
          }
        }
        
        // For Firefox, we can use a different approach (status bar color on Android)
        if (navigator.userAgent.toLowerCase().indexOf('firefox') > -1) {
          // Firefox uses a different approach via CSS for PWA
          const style = document.createElement('style');
          style.textContent = `
            @media (display-mode: standalone) {
              body {
                background-color: #059669;
              }
            }
          `;
          document.head.appendChild(style);
        }
      })();
    </script>
